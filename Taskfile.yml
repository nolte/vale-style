version: '3'

tasks:
  lint:
    desc: Run pre-commit hooks across the repository
    cmds:
      - pre-commit run --all-files

  test:
    desc: Lint this repo's Markdown with the shipped vocabularies
    cmds:
      - vale .

  glossary:check:
    desc: Fail if any accept.txt term lacks a glossary entry (EN and DE)
    cmds:
      - python3 scripts/check_glossary_coverage.py

  glossary:stubs:
    desc: Scaffold TODO glossary stubs for any uncovered accept.txt terms
    cmds:
      - python3 scripts/check_glossary_coverage.py --write-stubs

  docs:
    desc: Build the MkDocs site in strict mode
    cmds:
      - mkdocs build --strict

  docs:serve:
    desc: Serve the MkDocs site locally with live reload
    cmds:
      - mkdocs serve

  build:
    desc: Build the nolte-styles.zip release artefact
    cmds:
      - rm -rf ./build/nolte-styles
      - mkdir -p ./build/nolte-styles
      - cp -R src/* ./build/nolte-styles/
      - cp src/.vale.ini ./build/nolte-styles/.vale.ini
      - (cd ./build && zip -r nolte-styles.zip nolte-styles)

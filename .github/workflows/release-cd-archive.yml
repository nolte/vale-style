on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing release tag to attach the ZIP to (manual recovery only). Required for workflow_dispatch; ignored on `release: [published]`."
        required: true
        type: string

jobs:
  archive:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@master
    - name: Copy the Readmes
      run: |
        mkdir -p ./build/nolte-styles
        cp -R src/* ./build/nolte-styles/
        cp -R src/.vale.ini ./build/nolte-styles/.vale.ini

    - uses: vimtor/action-zip@v1.2
      with:
        files: ./build/
        dest: nolte-styles.zip
        recursive: true

    - name: Upload Release
      uses: ncipollo/release-action@v1.20.0
      with:
          tag: ${{ inputs.tag || github.event.release.tag_name }}
          artifacts: "nolte-styles.zip"
          token: ${{ secrets.GITHUB_TOKEN }}
          allowUpdates: true

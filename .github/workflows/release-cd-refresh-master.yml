on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  refresh_presentation_branch:
    uses: nolte/gh-plumbing/.github/workflows/reusable-release-cd-refresh-master.yml@v1.1.18
    secrets:
      token: ${{ secrets.GITHUB_TOKEN }}
    with:
      target_branch: main
    permissions:
      contents: write
